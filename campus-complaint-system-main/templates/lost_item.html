{% extends "base.html" %}

{% block content %}

<h2>Lost & Found Items</h2>

<a href="/lostfound/add/" class="btn">
Add Item
</a>

{% for item in items %}
<div class="card">

<h3>{{ item.title }}</h3>
<p>{{ item.description }}</p>

{% if item.image %}
<img src="{{ item.image.url }}" width="120">
{% endif %}

</div>
{% endfor %}

{% endblock %}
