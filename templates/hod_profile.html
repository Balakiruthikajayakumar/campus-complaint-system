{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Smart Campus Complaint System</title>

<!-- Load CSS from static folder -->
<link rel="stylesheet" href="{% static 'css/hod_profile.css' %}">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<h2>SMART CAMPUS COMPLAINT SYSTEM</h2>

<div class="user-section">

<div class="username">
{{ request.user.username }} | HOD
</div>

<button class="back-btn" onclick="goBack()">← Back</button>

</div>

</header>


<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

<div class="sidebar-menu">

<a href="{% url 'hod_homepage' %}">Home 🏠</a>

<a href="{% url 'logout' %}">Logout 🚪</a>

</div>

</div>


<!-- ================= MAIN CONTENT ================= -->

<div class="main">

<h2>HOD PROFILE</h2>


<div class="profile-card">

<div class="detail-row">
<label>Name</label>
<p id="name">{{ request.user.username }}</p>
</div>

<div class="detail-row">
<label>Email</label>
<p id="email">{{ request.user.email }}</p>
</div>

<div class="detail-row">
<label>Department</label>
<p id="dept">{{ request.user.department }}</p>
</div>

</div>

</div>


<!-- ================= JAVASCRIPT ================= -->

<script>

function goBack(){
window.history.back()
}

</script>

</body>

</html>
