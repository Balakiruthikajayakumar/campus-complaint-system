{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Request Form</title>

<link rel="stylesheet" href="{% static 'css/apply_leave.css' %}">

</head>

<body>

<!-- Header -->
<div class="header">
🎓 Smart Campus
</div>


<div class="container">

<h2>Leave Request Form</h2>

<form method="POST">

{% csrf_token %}

<!-- Student Name -->
<label>Student Name</label>
<input type="text" name="name" placeholder="Enter your name" required>


<!-- Register Number -->
<label>Register Number</label>
<input type="text" name="reg_no" placeholder="Enter register number" required>


<!-- Department -->
<label>Department</label>
<select name="department" required>
<option value="">Select Department</option>
<option value="CSE">CSE</option>
<option value="IT">IT</option>
<option value="ECE">ECE</option>
<option value="EEE">EEE</option>
<option value="MECH">MECH</option>
</select>

<!------Year----->
<label>Year</label>
<select name="year" required>

<option value="">Select Year</option>

<option value="1">1st Year</option>
<option value="2">2nd Year</option>
<option value="3">3rd Year</option>
<option value="4">4th Year</option>

</select>


<!-- Section -->
<label>Section</label>
<select name="section" required>
<option value="">Select Section</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
</select>


<!-- Parent Mobile Number -->
<label>Parent Mobile Number</label>
<input type="tel" name="parent_phone" placeholder="Enter parent mobile number" required>


<!-- Confirmed With -->
<label>Confirmed With</label>
<select name="confirm">
<option value="">Select</option>
<option value="Father">Father</option>
<option value="Mother">Mother</option>
<option value="Guardian">Guardian</option>
</select>


<!-- Leave Dates -->
<label>Leave Start Date</label>
<input type="date" name="from_date" required>

<label>Leave End Date</label>
<input type="date" name="to_date" required>


<!-- Time -->
<label>Out Time</label>
<input type="time" name="out_time">

<label>In Time</label>
<input type="time" name="in_time">


<!-- Reason -->
<label>Reason for Leave</label>
<textarea name="purpose" rows="4" placeholder="Enter reason for leave" required></textarea>


<button type="submit">Submit Leave Request</button>

</form>

</div>

</body>
</html>
