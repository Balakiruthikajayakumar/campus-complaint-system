{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Deputy Warden Profile</title>

<link rel="stylesheet" href="{% static 'css/deputy_profile.css' %}">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>SMART CAMPUS COMPLAINT SYSTEM</h2>

  <div class="user-area">
    <div class="username">
      {{ name }} | Deputy Warden
    </div>
    <button class="back-btn" onclick="goBack()">Back</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="#">Home</a>
  <a href="{% url 'logout' %}">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <h2>DEPUTY WARDEN PROFILE</h2>

  <div class="profile-card">

    <div class="detail">
      <label>Name</label>
      <p>{{ name }}</p>
    </div>

    <div class="detail">
      <label>Email</label>
      <p>{{ email }}</p>
    </div>

    <div class="detail">
      <label>Username</label>
      <p>{{ username }}</p>
    </div>

  </div>

</div>

<script src="{% static 'js/deputy_profile.js' %}"></script>

</body>
</html>
